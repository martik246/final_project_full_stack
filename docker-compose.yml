services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookease}
      POSTGRES_USER: ${POSTGRES_USER:-bookease}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookease}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

  backend:
    build:
      context: ./backend
    env_file:
      - .env.prod
    environment:
      DB_ENGINE: postgres
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.prod
    depends_on:
      - backend

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
